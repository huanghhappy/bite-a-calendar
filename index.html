<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一口日曆 | Bite a Calendar</title>
    <meta property="og:title" content="一口日曆 Bite a Calendar">
    <meta property="og:description" content="一口美食，一口飲料，一句溫暖。你的專屬嘴饞充電站！">
    <meta property="og:image" content="social.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" href="logo.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="quotes.js"></script>

    <style>
        /* --- 1. 字型設定 (源泉圓體 TW) --- */
        @font-face { font-family: 'GenJyuu'; src: url('500.otf') format('opentype'); font-weight: 500; }
        @font-face { font-family: 'GenJyuu'; src: url('700.otf') format('opentype'); font-weight: 700; }
        @font-face { font-family: 'GenJyuu'; src: url('900.otf') format('opentype'); font-weight: 900; }

        /* --- 2. 顏色與黏土風變數 (文青燕麥色調) --- */
        :root {
            --bg-color: #F8F6F0;      /* 溫潤燕麥白 */
            --primary: #B8A690;       /* 奶茶淺棕/拿鐵色 */
            --secondary: #E6DFD3;     /* 燕麥淺卡其 */
            --text-dark: #4A4035;     /* 深焙咖啡色 */
            --text-light: #857A6F;    /* 淺焙咖啡色 */
            
            /* 調整陰影以配合燕麥底色 */
            --clay-shadow: 6px 6px 14px #E0D7C9, -6px -6px 14px #FFFFFF;
            --clay-inset: inset 3px 3px 6px rgba(255, 255, 255, 0.9), inset -3px -3px 6px rgba(74, 64, 53, 0.05);
            --sticker-shadow: 0 8px 16px rgba(74, 64, 53, 0.08);
        }

        * { box-sizing: border-box; font-family: 'GenJyuu', sans-serif; }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-dark);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        #app-container {
            width: 100%; max-width: 500px; padding: 25px 20px; flex: 1; 
            display: flex; flex-direction: column; position: relative;
        }

        /* --- 3. 標題區 --- */
        .header { text-align: center; margin-bottom: 25px; position: relative; }
        .header h1 { font-weight: 900; color: var(--text-dark); margin: 10px 0 5px; font-size: 32px; letter-spacing: 1px;}
        .header h2 { margin:0 0 10px 0; font-size:16px; color:var(--primary); font-weight:900; }
        .header p { font-weight: 500; color: var(--text-light); margin: 0; font-size: 14px; }
        
        .header-icon { width: 60px; position: absolute; top: -15px; right: 10px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* --- 4. 黏土風卡片與按鈕 --- */
        .clay-card {
            background: var(--bg-color); border-radius: 28px; padding: 25px 20px;
            box-shadow: var(--clay-shadow); position: relative; margin-bottom: 25px;
        }
        .clay-card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            border-radius: 28px; box-shadow: var(--clay-inset); pointer-events: none;
        }

        .btn {
            background: var(--primary); color: white; border: none; padding: 16px 24px;
            border-radius: 100px; font-weight: 900; font-size: 18px; cursor: pointer;
            box-shadow: 4px 4px 10px #D6CABA, -4px -4px 10px #DCD1C2;
            transition: all 0.15s ease; width: 100%; margin-bottom: 15px; letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.97); box-shadow: inset 3px 3px 8px rgba(0,0,0,0.1); }
        .btn.secondary { background: var(--bg-color); color: var(--text-dark); box-shadow: var(--clay-shadow); border: 2px solid var(--secondary);}

        /* --- 5. 行事曆網格 --- */
        .calendar-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 900; font-size: 20px; color: var(--text-dark); }
        .nav-btn { cursor: pointer; padding: 5px 15px; color: var(--primary); font-size: 24px; user-select: none;}
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .weekday { font-weight: 700; color: var(--primary); font-size: 14px; margin-bottom: 8px; }
        
        .day-cell {
            aspect-ratio: 1; border-radius: 14px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-weight: 700; font-size: 16px; 
            cursor: pointer; position: relative; color: var(--text-light);
            box-shadow: inset 3px 3px 8px #E0D7C9, inset -3px -3px 8px #FFFFFF;
            transition: transform 0.1s;
        }
        .day-cell:active { transform: scale(0.9); }
        
        /* 有紀錄的日期樣式 */
        .day-cell.has-record { box-shadow: 3px 3px 8px #E0D7C9, -3px -3px 8px #FFFFFF; background: white; padding: 4px;}
        .day-cell .thumbnail { 
            width: 100%; height: 100%; border-radius: 8px; object-fit: cover; 
            border: 3px solid white; box-shadow: 0 2px 4px rgba(74, 64, 53, 0.1); 
        }
        .day-cell.has-record span { display: none; }

        .stats-area { display: flex; align-items: center; justify-content: center; margin-top: 20px; font-weight: 900; color: var(--text-dark); font-size: 20px; }
        .stats-area img { width: 40px; margin-right: 10px; }

        /* --- 6. 視圖切換 --- */
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 7. 單日紀錄與貼紙特效 --- */
        .quote-box {
            background: white; padding: 20px; border-radius: 20px; margin-bottom: 25px; 
            font-weight: 700; text-align: left; color: var(--text-dark); 
            box-shadow: var(--clay-shadow); position: relative; line-height: 1.6;
        }
        .quote-box img { width: 35px; position: absolute; bottom: -10px; right: -10px; transform: rotate(15deg); }

        .upload-area { 
            border: 3px dashed var(--secondary); border-radius: 24px; padding: 30px 20px; 
            text-align: center; cursor: pointer; margin-bottom: 20px; background: white;
            color: var(--primary); font-weight: 700; transition: background 0.2s;
        }
        .upload-area:active { background: #F5EFEB; }
        .upload-area input[type="file"] { display: none; }
        
        .input-group label { display: block; font-weight: 900; margin-bottom: 10px; color: var(--text-dark); }
        .input-group input[type="number"] { 
            width: 100%; padding: 16px; border-radius: 16px; border: none; 
            box-shadow: inset 4px 4px 8px #E0D7C9, inset -4px -4px 8px #FFFFFF; 
            font-size: 18px; background: var(--bg-color); margin-bottom: 25px; color: var(--text-dark); font-weight: 700; outline: none;
        }

        .sticker-img { 
            width: 90%; margin: 0 auto 20px auto; display: block;
            border: 12px solid white; border-bottom-width: 35px; border-radius: 8px; 
            box-shadow: var(--sticker-shadow); object-fit: cover;
        }

        .record-cost { text-align: center; font-weight: 900; font-size: 20px; color: var(--text-dark); margin-top: -45px; margin-bottom: 30px; position: relative; z-index: 10; font-family: 'GenJyuu', sans-serif;}

        /* --- 8. 底部 --- */
        .footer { text-align: center; font-size: 13px; color: var(--text-light); padding: 20px 0; margin-top: auto; font-weight: 700; letter-spacing: 1px;}

        /* --- 9. 隱藏的截圖專用區 --- */
        #export-container { position: absolute; top: -9999px; left: -9999px; width: 1080px; background: var(--bg-color); padding: 0; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="home-view" class="view active">
        <div class="header">
            <img src="clay_sun.png" alt="sun" class="header-icon" onerror="this.style.display='none'">
            <h1>一口日曆</h1>
            <h2>Bite a Calendar</h2>
            <p>一口美食，一口飲料，一句溫暖。<br>你的專屬嘴饞充電站！</p>
        </div>

        <div class="clay-card">
            <div class="calendar-controls">
                <span class="nav-btn" onclick="changeMonth(-1)">‹</span>
                <span id="month-year-display">2026 年 3 月</span>
                <span class="nav-btn" onclick="changeMonth(1)">›</span>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            
            <div class="stats-area">
                <img src="clay_coin.png" alt="coin" onerror="this.style.display='none'">
                本月嘴饞開銷：$ <span id="monthly-total">0</span>
            </div>
        </div>

        <button class="btn" onclick="exportMonthly()">打包本月月曆 (分享圖)</button>
        <div class="footer">© 2026 an App a Day Project.</div>
    </div>

    <div id="day-view" class="view">
        <div class="header">
            <h1 id="selected-date-display" style="font-size: 36px; color: var(--text-dark);">3月15日</h1>
        </div>

        <div class="quote-box">
            <span id="daily-quote">加載中...</span>
            <img src="clay_heart.png" alt="heart" onerror="this.style.display='none'">
        </div>

        <div class="clay-card">
            <div id="records-list"></div>

            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <p style="margin:0; font-size:18px;">📸 點擊上傳今日美食/飲料<br><span style="font-size:14px; color:var(--text-light); font-weight:500;">(自動套用可愛拍立得白框！)</span></p>
                <input type="file" id="file-input" accept="image/*" onchange="handleImageUpload(event)">
            </div>
            
            <div class="input-group">
                <label>💸 花費開銷 (元)</label>
                <input type="number" id="cost-input" placeholder="例如：150" inputmode="numeric">
            </div>

            <button class="btn" onclick="saveRecord()">儲存這筆紀錄</button>
            <button class="btn secondary" onclick="exportDaily()">下載當日日曆紙</button>
            <button class="btn secondary" style="margin-top: 5px; background: transparent; box-shadow: none; border:none; color: var(--text-light);" onclick="goHome()">返回行事曆</button>
        </div>
        <div class="footer">© 2026 an App a Day Project.</div>
    </div>
</div>

<div id="export-container"></div>

<script>
    // 確保 quotes.js 有正確載入
    const appQuotes = window.biteCalendarQuotes || ["記得每天都要好好吃飯喔！"];

    let currentDate = new Date();
    let selectedDateStr = "";
    let uploadedImageBase64 = null;
    let records = JSON.parse(localStorage.getItem('biteCalendarRecords')) || {};

    function init() { renderCalendar(); }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const monthDisplay = document.getElementById('month-year-display');
        grid.innerHTML = '';
        
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        monthDisplay.innerText = `${year} 年 ${month + 1} 月`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        weekdays.forEach(day => {
            const div = document.createElement('div');
            div.className = 'weekday';
            div.innerText = day;
            grid.appendChild(div);
        });

        for (let i = 0; i < firstDay; i++) { grid.appendChild(document.createElement('div')); }

        let monthlyTotal = 0;

        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            const numSpan = document.createElement('span');
            numSpan.innerText = i;
            cell.appendChild(numSpan);
            
            cell.onclick = () => openDayView(dateStr);

            if (records[dateStr] && records[dateStr].length > 0) {
                cell.classList.add('has-record');
                if (records[dateStr][0].img) {
                    const thumb = document.createElement('img');
                    thumb.src = records[dateStr][0].img;
                    thumb.className = 'thumbnail';
                    cell.appendChild(thumb);
                }
                records[dateStr].forEach(r => monthlyTotal += parseInt(r.cost || 0));
            }
            grid.appendChild(cell);
        }
        document.getElementById('monthly-total').innerText = monthlyTotal.toLocaleString();
    }

    function changeMonth(offset) {
        currentDate.setMonth(currentDate.getMonth() + offset);
        renderCalendar();
    }

    function openDayView(dateStr) {
        selectedDateStr = dateStr;
        const [y, m, d] = dateStr.split('-');
        document.getElementById('selected-date-display').innerText = `${parseInt(m)}月${parseInt(d)}日`;
        
        const start = new Date(y, 0, 0);
        const diff = (new Date(dateStr) - start) + ((start.getTimezoneOffset() - new Date(dateStr).getTimezoneOffset()) * 60 * 1000);
        const oneDay = 1000 * 60 * 60 * 24;
        const dayOfYear = Math.floor(diff / oneDay);
        
        const quoteIndex = (dayOfYear - 1) % appQuotes.length;
        document.getElementById('daily-quote').innerText = appQuotes[quoteIndex];

        renderDayRecords();
        document.getElementById('home-view').classList.remove('active');
        document.getElementById('day-view').classList.add('active');
        window.scrollTo(0,0);
    }

    function goHome() {
        uploadedImageBase64 = null;
        document.getElementById('cost-input').value = '';
        renderCalendar();
        document.getElementById('day-view').classList.remove('active');
        document.getElementById('home-view').classList.add('active');
        window.scrollTo(0,0);
    }

    function handleImageUpload(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImageBase64 = e.target.result;
                const previewImg = document.createElement('img');
                previewImg.src = uploadedImageBase64;
                previewImg.className = 'sticker-img';
                previewImg.style.transform = `rotate(${Math.random() * 6 - 3}deg)`;
                
                const list = document.getElementById('records-list');
                list.appendChild(previewImg);
            };
            reader.readAsDataURL(file);
        }
    }

    function saveRecord() {
        const costVal = document.getElementById('cost-input').value;
        if (!uploadedImageBase64 && !costVal) {
            alert('請至少上傳一張照片或輸入開銷喔！'); return;
        }
        if (!records[selectedDateStr]) records[selectedDateStr] = [];
        
        records[selectedDateStr].push({
            img: uploadedImageBase64 || '',
            cost: costVal || 0
        });

        localStorage.setItem('biteCalendarRecords', JSON.stringify(records));
        uploadedImageBase64 = null;
        document.getElementById('cost-input').value = '';
        
        renderDayRecords();
        alert('紀錄成功！已貼上今日日曆。');
    }

    function renderDayRecords() {
        const list = document.getElementById('records-list');
        list.innerHTML = '';
        if (records[selectedDateStr]) {
            records[selectedDateStr].forEach(r => {
                const wrapper = document.createElement('div');
                if (r.img) {
                    const img = document.createElement('img');
                    img.src = r.img;
                    img.className = 'sticker-img';
                    img.style.transform = `rotate(${Math.random() * 4 - 2}deg)`;
                    wrapper.appendChild(img);
                }
                if (r.cost && r.cost > 0) {
                    const costDiv = document.createElement('div');
                    costDiv.className = 'record-cost';
                    costDiv.innerText = `$ ${r.cost}`;
                    wrapper.appendChild(costDiv);
                }
                list.appendChild(wrapper);
            });
        }
    }
    
    // 匯出功能色系已同步更新為燕麥/奶茶色 (#F8F6F0, #B8A690, #4A4035)
    async function exportDaily() {
        const container = document.getElementById('export-container');
        const quote = document.getElementById('daily-quote').innerText;
        const [y, m, d] = selectedDateStr.split('-');
        
        let imagesHtml = '';
        let totalCost = 0;
        if(records[selectedDateStr]){
            records[selectedDateStr].forEach(r => {
                if(r.img) {
                    const rotation = Math.random() * 6 - 3;
                    imagesHtml += `
                        <div style="position:relative; margin-bottom: 40px; transform: rotate(${rotation}deg);">
                            <img src="${r.img}" style="width:80%; max-height:700px; object-fit:cover; border:20px solid white; border-bottom-width: 80px; border-radius:12px; box-shadow: 0 15px 35px rgba(74, 64, 53, 0.1); display:block; margin: 0 auto;">
                            ${r.cost > 0 ? `<div style="position:absolute; bottom:20px; width:100%; text-align:center; font-size:40px; font-weight:900; color:#4A4035; font-family:'GenJyuu', sans-serif;">$ ${r.cost}</div>` : ''}
                        </div>`;
                }
                totalCost += parseInt(r.cost || 0);
            });
        }

        container.innerHTML = `
            <div style="background-color: #F8F6F0; padding: 60px; font-family: 'GenJyuu', sans-serif;">
                <div style="background: white; padding: 80px 60px; border-radius: 40px; box-shadow: 10px 10px 40px rgba(74, 64, 53, 0.06); text-align: center; position:relative; overflow:hidden;">
                    <div style="position:absolute; top:20px; left:20px; right:20px; bottom:20px; border: 4px dashed #E6DFD3; border-radius: 30px; pointer-events:none;"></div>
                    
                    <h3 style="font-size: 36px; color: #B8A690; margin: 0 0 10px 0; font-weight:900;">${y} 年 ${parseInt(m)} 月</h3>
                    <h2 style="font-size: 160px; color: #4A4035; margin: 0; font-weight: 900; line-height: 1;">${parseInt(d)}</h2>
                    
                    <div style="font-size: 42px; color: #4A4035; font-weight: 700; margin: 50px 0; padding: 40px; background: #F8F6F0; border-radius: 20px;">
                        "${quote}"
                    </div>
                    
                    <div style="margin-top:60px;">${imagesHtml}</div>
                    
                    <div style="font-size: 40px; font-weight: 900; color: #4A4035; margin-top: 50px;">本日嘴饞開銷: $ ${totalCost.toLocaleString()}</div>
                    <div style="margin-top: 80px; font-size: 28px; color: #857A6F; font-weight: 700;">© 2026 an App a Day Project.</div>
                </div>
            </div>
        `;
        await triggerDownload(container, `BiteCalendar_${selectedDateStr}.png`);
    }

    async function exportMonthly() {
        const container = document.getElementById('export-container');
        const cloneGrid = document.getElementById('calendar-grid').innerHTML;
        const title = document.getElementById('month-year-display').innerText;
        const total = document.getElementById('monthly-total').innerText;

        container.innerHTML = `
            <div style="background: #F8F6F0; padding: 80px; font-family: 'GenJyuu', sans-serif;">
                <h1 style="text-align:center; font-size: 70px; color: #4A4035; margin: 0 0 10px 0; font-weight:900;">一口日曆 Bite a Calendar</h1>
                <h2 style="text-align:center; font-size: 45px; color: #857A6F; margin-bottom: 60px;">${title} 嘴饞總結報告</h2>
                
                <div style="background: white; padding: 50px; border-radius: 40px; box-shadow: 10px 10px 40px rgba(74, 64, 53, 0.06);">
                    <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 20px; text-align: center;">
                        ${cloneGrid.replace(/width: 100%; height: 100%;/g, 'width: 100%; aspect-ratio: 1; border: 6px solid white; border-radius: 16px; box-shadow: 0 4px 10px rgba(74,64,53,0.1);')} 
                    </div>
                </div>

                <div style="text-align:center; font-size: 50px; font-weight:900; color: #B8A690; margin-top: 70px;">
                    本月總開銷: $ ${total}
                </div>
                <div style="text-align:center; margin-top: 80px; font-size: 28px; color: #857A6F; font-weight:700;">
                    下個月也要好好吃飯喔！<br><br>© 2026 an App a Day Project.
                </div>
            </div>
        `;

        const cells = container.querySelectorAll('.day-cell');
        cells.forEach(c => { 
            c.style.fontSize = '35px'; 
            c.style.borderRadius = '20px'; 
            c.style.background = '#F8F6F0';
            c.style.boxShadow = 'inset 4px 4px 10px #E0D7C9, inset -4px -4px 10px #FFFFFF';
            if(c.classList.contains('has-record')){
                c.style.background = 'white';
                c.style.boxShadow = '4px 4px 10px #E0D7C9, -4px -4px 10px #FFFFFF';
                c.style.padding = '8px';
            }
        });
        const weekdays = container.querySelectorAll('.weekday');
        weekdays.forEach(w => { w.style.fontSize = '35px'; w.style.marginBottom = '30px'; w.style.color = '#B8A690'; });

        await triggerDownload(container, `BiteCalendar_MonthlyStats.png`);
    }

    async function triggerDownload(element, filename) {
        try {
            await new Promise(r => setTimeout(r, 300)); 
            const canvas = await html2canvas(element, { scale: 1.5, backgroundColor: null, useCORS: true });
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
            element.innerHTML = ''; 
        } catch (error) {
            console.error("圖片生成失敗", error);
            alert("匯出圖片時發生錯誤，請稍後再試。");
            element.innerHTML = '';
        }
    }

    init();
</script>
</body>
</html>
