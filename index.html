<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一口日曆 Bite a Calendar</title>
    <meta property="og:title" content="一口日曆 Bite a Calendar">
    <meta property="og:description" content="一口美食，一口飲料，一句溫暖的專屬充電站！">
    <meta property="og:image" content="./social.png">
    <link rel="icon" href="./logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #F8F6F0 0%, #E6DFD3 100%);
            color: #4A4035;
            -webkit-tap-highlight-color: transparent;
        }
        
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
        }

        /* 主標題中英文對齊魔法 */
        .title-zh { text-align-last: justify; font-weight: 900; letter-spacing: 2px; }
        .title-en { font-weight: 900; letter-spacing: 0.5px; }

        /* 月曆網格穩定設計，解決排版跑掉的問題 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .calendar-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: #fff;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.05);
            font-weight: 700;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .calendar-cell:active { transform: scale(0.95); }
        .calendar-cell.empty { background: transparent; box-shadow: none; cursor: default; }
        
        /* 紀錄縮圖：使用 object-fit 確保不變形、不撐破網格 */
        .record-thumb {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.6;
            z-index: 0;
        }
        .cell-date { position: relative; z-index: 1; text-shadow: 0 0 4px white; }

        /* 精美對話框設計 */
        .speech-bubble {
            position: relative;
            background: #fff;
            border-radius: 20px;
            padding: 16px 24px;
            box-shadow: 0 10px 25px rgba(133, 122, 111, 0.15);
            line-height: 1.6;
            text-align: center;
            border: 2px solid #F0EBE1;
        }
        .speech-bubble::after {
            content: ''; position: absolute;
            bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid;
            border-color: #fff transparent transparent transparent;
            display: block; width: 0;
        }

        /* 隱藏的截圖區域，用來生成完美尺寸的 day.jpg */
        #capture-area {
            position: fixed; top: -9999px; left: 0;
            width: 800px; height: 1200px; /* 高畫質直式比例 */
            background: linear-gradient(135deg, #F8F6F0 0%, #E6DFD3 100%);
            padding: 60px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(74, 64, 53, 0.8); z-index: 50; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
    </style>
</head>
<body>

<div class="app-container p-6 pb-24">
    <header class="flex items-center justify-between mb-8 relative">
        <div class="flex items-center gap-4 w-full">
            <img src="./icon.png" alt="Logo" class="w-16 h-16 object-contain filter drop-shadow-md">
            
            <div class="flex-1 flex flex-col justify-center">
                <div class="title-zh text-2xl text-[#4A4035] leading-none mb-1">一口日曆</div>
                <div class="title-en text-sm text-[#857A6F] leading-none flex justify-between">
                    <span>B</span><span>I</span><span>T</span><span>E</span><span> </span><span>A</span><span> </span><span>C</span><span>A</span><span>L</span><span>E</span><span>N</span><span>D</span><span>A</span><span>R</span>
                </div>
            </div>
        </div>
        <img src="./clay_header_icon.png" alt="Deco" class="w-12 h-12 absolute -top-2 -right-2 transform rotate-12 drop-shadow-sm">
    </header>

    <section class="bg-white rounded-2xl p-5 mb-8 flex items-center justify-between shadow-sm relative overflow-hidden">
        <div>
            <div class="text-[#857A6F] text-sm font-bold mb-1">本月嘴饞投資</div>
            <div class="text-3xl font-black text-[#4A4035]">$ <span id="total-expense">0</span></div>
        </div>
        <img src="./clay_coin.png" alt="Coin" class="w-16 h-16 drop-shadow-md transform hover:scale-110 transition">
    </section>

    <section>
        <div class="flex justify-between items-center mb-4 px-2">
            <button onclick="changeMonth(-1)" class="text-[#857A6F] font-bold text-xl px-2">&lt;</button>
            <h2 id="month-display" class="text-xl font-black text-[#4A4035]">2026 年 3 月</h2>
            <button onclick="changeMonth(1)" class="text-[#857A6F] font-bold text-xl px-2">&gt;</button>
        </div>
        <div class="calendar-grid mb-2 text-center text-[#857A6F] font-bold text-sm">
            <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
        </div>
        <div id="calendar-body" class="calendar-grid">
            </div>
    </section>

    <button onclick="openAddModal()" class="fixed bottom-8 right-1/2 transform translate-x-1/2 bg-[#4A4035] text-white rounded-full w-14 h-14 flex items-center justify-center shadow-lg text-2xl hover:bg-[#605548] transition z-40">
        +
    </button>
</div>

<div id="add-modal" class="modal">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 relative">
        <button onclick="closeModal('add-modal')" class="absolute top-4 right-5 text-[#857A6F] font-bold text-xl">&times;</button>
        <h3 class="text-xl font-black text-[#4A4035] mb-6 text-center" id="modal-date-title">新增紀錄</h3>
        
        <div class="space-y-5">
            <label class="block cursor-pointer">
                <div class="flex items-center gap-3 mb-2">
                    <img src="./clay_camera.png" class="w-8 h-8">
                    <span class="font-bold text-[#857A6F]">今天吃了什麼？</span>
                </div>
                <div id="image-preview-container" class="w-full aspect-[4/3] bg-[#F8F6F0] rounded-xl border-2 border-dashed border-[#DCD5C6] flex items-center justify-center overflow-hidden">
                    <span class="text-[#B8A690] font-bold">+ 點擊上傳照片</span>
                    <img id="image-preview" class="hidden w-full h-full object-cover">
                </div>
                <input type="file" id="image-input" accept="image/*" class="hidden" onchange="previewImage(event)">
            </label>

            <div>
                <div class="flex items-center gap-3 mb-2">
                    <img src="./clay_receipt.png" class="w-8 h-8">
                    <span class="font-bold text-[#857A6F]">花了多少錢？</span>
                </div>
                <input type="number" id="expense-input" placeholder="輸入金額" class="w-full bg-[#F8F6F0] rounded-xl px-4 py-3 font-bold text-[#4A4035] outline-none border-2 border-transparent focus:border-[#DCD5C6]">
            </div>

            <button onclick="saveRecord()" class="w-full bg-[#B8A690] text-white font-bold py-4 rounded-xl shadow-sm hover:bg-[#A3927D] transition">
                儲存美好瞬間
            </button>
        </div>
    </div>
</div>

<div id="view-modal" class="modal">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 relative">
        <button onclick="closeModal('view-modal')" class="absolute top-4 right-5 text-[#857A6F] font-bold text-xl">&times;</button>
        
        <div class="flex justify-center -mt-12 mb-4">
            <img src="./clay_heart.png" class="w-20 h-20 drop-shadow-md">
        </div>

        <div id="view-date" class="text-center text-[#857A6F] font-bold mb-4"></div>
        
        <div class="bg-white p-3 rounded-lg shadow-md mb-6 transform rotate-1">
            <img id="view-image" class="w-full aspect-[4/3] object-cover rounded shadow-inner mb-3">
            <div id="view-expense" class="text-center font-black text-xl text-[#4A4035]"></div>
        </div>

        <div class="speech-bubble mb-6 text-[#857A6F] font-bold" id="view-quote"></div>

        <div class="flex gap-3">
            <button onclick="downloadImage()" class="flex-1 bg-[#4A4035] text-white font-bold py-3 rounded-xl hover:bg-[#605548] transition">下載日曆紙</button>
            <button onclick="deleteRecord()" class="flex-1 bg-[#FF6B6B] text-white font-bold py-3 rounded-xl hover:bg-[#FF4F4F] transition shadow-sm">刪除紀錄</button>
        </div>
    </div>
</div>

<div id="capture-area">
    <div class="flex items-center gap-4 mb-10 mt-10">
        <img src="./clay_heart.png" class="w-16 h-16">
        <div class="text-4xl font-black text-[#4A4035]" id="cap-date">2026.03.15</div>
    </div>
    
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full mb-12 relative">
        <img src="./clay_camera.png" class="absolute -top-6 -right-6 w-20 h-20 z-10 transform rotate-12">
        <div class="w-full aspect-square bg-gray-100 rounded-xl overflow-hidden shadow-inner mb-6">
            <img id="cap-image" class="w-full h-full object-cover">
        </div>
        <div class="text-center font-black text-3xl text-[#4A4035]" id="cap-expense"></div>
    </div>

    <div class="speech-bubble w-full text-3xl text-[#857A6F] font-bold mb-16" id="cap-quote"></div>

    <div class="flex items-center gap-4 mt-auto opacity-70">
        <img src="./icon.png" class="w-16 h-16">
        <div>
            <div class="text-2xl font-black text-[#4A4035] tracking-widest mb-1">一口日曆</div>
            <div class="text-lg font-bold text-[#857A6F] tracking-widest">Bite a Calendar</div>
        </div>
    </div>
</div>

<script>
    // 預設療癒金句庫 (確保第一句結尾有逗點「，」)
    const quotes = [
        "今天辛苦了，<br>來點甜的犒賞自己吧！",
        "不管世界多吵雜，<br>記得把心留給自己。",
        "大口吃下美食，<br>把煩惱通通忘掉！",
        "花錢買快樂，<br>這筆投資非常值得。",
        "生活需要儀式感，<br>就從好好吃一頓開始。"
    ];

    let currentDate = new Date();
    let records = JSON.parse(localStorage.getItem('biteRecords')) || {};
    let selectedDateStr = "";

    // 初始化
    function init() {
        renderCalendar();
        updateTotalExpense();
    }

    // 渲染月曆
    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        document.getElementById('month-display').innerText = `${year} 年 ${month + 1} 月`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const body = document.getElementById('calendar-body');
        body.innerHTML = '';

        // 填補月初空白
        for (let i = 0; i < firstDay; i++) {
            body.innerHTML += `<div class="calendar-cell empty"></div>`;
        }

        // 生成日期格子
        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const hasRecord = records[dateStr];
            
            // 如果有紀錄，顯示縮圖，並調整文字顏色為白色加陰影
            let innerHTML = `<span class="cell-date ${hasRecord ? 'text-white' : ''}">${i}</span>`;
            if (hasRecord && hasRecord.img) {
                innerHTML += `<img src="${hasRecord.img}" class="record-thumb">`;
            }

            body.innerHTML += `
                <div class="calendar-cell" onclick="handleDateClick('${dateStr}')">
                    ${innerHTML}
                </div>
            `;
        }
    }

    function changeMonth(delta) {
        currentDate.setMonth(currentDate.getMonth() + delta);
        renderCalendar();
    }

    // 點擊日期
    function handleDateClick(dateStr) {
        selectedDateStr = dateStr;
        if (records[dateStr]) {
            viewRecord(dateStr);
        } else {
            document.getElementById('modal-date-title').innerText = `新增紀錄 (${dateStr})`;
            document.getElementById('image-preview').src = '';
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('image-preview-container').querySelector('span').classList.remove('hidden');
            document.getElementById('expense-input').value = '';
            document.getElementById('image-input').value = '';
            openModal('add-modal');
        }
    }

    // 預覽圖片
    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('image-preview');
                img.src = e.target.result;
                img.classList.remove('hidden');
                document.getElementById('image-preview-container').querySelector('span').classList.add('hidden');
            }
            reader.readAsDataURL(file);
        }
    }

    // 儲存紀錄
    function saveRecord() {
        const expense = document.getElementById('expense-input').value;
        const img = document.getElementById('image-preview').src;
        
        if (!expense || img.includes('html')) {
            alert('請上傳照片並輸入金額喔！');
            return;
        }

        // 隨機抽取一句強制兩行的金句
        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];

        records[selectedDateStr] = {
            expense: parseInt(expense),
            img: img,
            quote: randomQuote
        };

        localStorage.setItem('biteRecords', JSON.stringify(records));
        closeModal('add-modal');
        renderCalendar();
        updateTotalExpense();
    }

    // 查看紀錄
    function viewRecord(dateStr) {
        const record = records[dateStr];
        document.getElementById('view-date').innerText = dateStr.replace(/-/g, '.');
        document.getElementById('view-image').src = record.img;
        document.getElementById('view-expense').innerText = `$ ${record.expense}`;
        document.getElementById('view-quote').innerHTML = record.quote; // 使用 innerHTML 渲染 <br>
        
        // 同步填入隱藏截圖區
        document.getElementById('cap-date').innerText = dateStr.replace(/-/g, '.');
        document.getElementById('cap-image').src = record.img;
        document.getElementById('cap-expense').innerText = `花費 $${record.expense}`;
        document.getElementById('cap-quote').innerHTML = record.quote;

        openModal('view-modal');
    }

    // 刪除紀錄 (新增功能)
    function deleteRecord() {
        if(confirm("確定要刪除這筆紀錄嗎？一旦刪除就吃不回來囉！")) {
            delete records[selectedDateStr];
            localStorage.setItem('biteRecords', JSON.stringify(records));
            closeModal('view-modal');
            renderCalendar();
            updateTotalExpense();
        }
    }

    // 下載精美日曆紙 (修復比例問題)
    function downloadImage() {
        const target = document.getElementById('capture-area');
        
        // 確保截圖時圖片已完全載入
        setTimeout(() => {
            html2canvas(target, { 
                scale: 2, 
                useCORS: true,
                backgroundColor: null // 保留漸層背景
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `一口日曆_${selectedDateStr}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            });
        }, 100);
    }

    // 更新總花費
    function updateTotalExpense() {
        const currentMonthPrefix = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
        let total = 0;
        for (const date in records) {
            if (date.startsWith(currentMonthPrefix)) {
                total += records[date].expense;
            }
        }
        document.getElementById('total-expense').innerText = total;
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    // 啟動
    init();
</script>
</body>
</html>
